# ──────────────────────────────────────────────
# Secret：存储敏感配置
# 面试考点：Secret 和 ConfigMap 的区别？
# ConfigMap 明文存储，Secret base64 编码（注意：不是加密！）
# 生产中通常配合 Vault、KMS 等工具做真正的加密管理
# 这里演示基础用法
# ──────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ozondemo-secret
  namespace: default
type: Opaque           # Opaque = 通用键值对类型
stringData:
  # stringData 里可以直接写明文，K8s 会自动做 base64 编码
  # 这样比手动 base64 更方便
  AUTH_SECRET: "ozon-demo-secret-change-in-prod"
