# ──────────────────────────────────────────────
# Nginx 配置文件（容器环境专用）
# 面试考点：
#   1. Vue Router history 模式为什么需要特殊配置？
#   2. 容器间通信为什么用服务名而不是 localhost？
# ──────────────────────────────────────────────

server {
    # 监听 80 端口（HTTP）
    listen 80;
    server_name _;  # _ 表示匹配所有主机名

    # 【静态文件根目录】
    # 这里存放的是 vite build 产出的 dist/ 内容
    root /usr/share/nginx/html;
    index index.html;

    # 【Vue Router History 模式兼容】
    # 面试高频考点！
    # 问题：用户直接访问 /dashboard 时，Nginx 会去找 /dashboard 这个文件
    #        但 dist/ 里只有 index.html，没有 dashboard 文件，会 404
    # 解决：try_files 按顺序尝试：
    #   $uri        → 先找同名文件（例如 /logo.png 就能直接返回）
    #   $uri/       → 再找同名目录下的 index
    #   /index.html → 都没找到就返回 index.html，让 Vue Router 处理路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 【反向代理：把 API 请求转发给后端容器】
    # 面试考点：容器间通信
    # 在 docker-compose 中，服务名就是域名（DNS 自动解析）
    # backend 容器的服务名是 "backend"，所以用 http://backend:8001
    # 在 K8s 中，Service 名就是域名，原理一样
    location /api/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 这两个 header 告诉后端"真实的客户端 IP 和协议"
        # 因为请求经过了 Nginx 这层代理，后端直接看到的是 Nginx 的 IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 把其他后端路由也代理过去
    location /ai/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /analysis/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /market-trends {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /shop-performance {
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 代理（需要特殊配置）
    # 面试考点：WebSocket 不是普通 HTTP，需要升级协议
    location /ws/ {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        # Upgrade 和 Connection 这两个 header 是 WebSocket 握手必须的
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 静态资源缓存（性能优化）
    # Vite 构建的 JS/CSS 文件名带 hash（如 index.8a3f2b.js），内容不变 URL 不变
    # 所以可以设置很长的缓存时间
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
